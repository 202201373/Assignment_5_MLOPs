name: ML Pipeline - Validate & Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:

  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Setup DVC GDrive Credentials
        env:
          GDRIVE_CREDENTIALS: ${{ secrets.GDRIVE_CREDENTIALS }}
        run: |
          if [ -n "$GDRIVE_CREDENTIALS" ]; then
            echo "$GDRIVE_CREDENTIALS" > dvc_creds.json
            dvc remote modify myremote gdrive_use_service_account true
            dvc remote modify myremote gdrive_service_account_json_file_path dvc_creds.json
          fi

      - name: Pull data with DVC
        run: |
          dvc pull || echo "DVC pull skipped (no remote configured or no credentials)"

      - name: Train model
        env:
          MLFLOW_TRACKING_URI: ${{ secrets.MLFLOW_TRACKING_URI }}
        run: |
          python train.py --epochs 1 --learning_rate 10.0 --batch_size 64 --optimizer adam

      - name: Verify model_info.txt exists
        run: |
          if [ ! -f model_info.txt ]; then
            echo "ERROR: model_info.txt was not created!"
            exit 1
          fi
          echo "Run ID: $(cat model_info.txt)"

      - name: Upload model artifacts
        uses: actions/upload-artifact@v4
        with:
          name: model-artifacts
          path: |
            model_info.txt
            mlflow.db
            mlruns/

  deploy:
    runs-on: ubuntu-latest
    needs: validate

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Download model artifacts
        uses: actions/download-artifact@v4
        with:
          name: model-artifacts

      - name: Display Run ID
        run: |
          echo "Retrieved Run ID: $(cat model_info.txt)"

      - name: Check accuracy threshold
        env:
          MLFLOW_TRACKING_URI: ${{ secrets.MLFLOW_TRACKING_URI }}
        run: |
          python check_threshold.py

      - name: Mock Docker Build
        run: |
          echo "Building Docker image for Run ID: $(cat model_info.txt)"
